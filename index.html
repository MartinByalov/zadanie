<!DOCTYPE html>
<html lang="bg">
  <head>
    <meta charset="UTF-8">
    <title>Качване на файл</title>

    <!-- Настройки за Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' https://www.zadanie.lol; script-src 'self'; style-src 'self';">

    <!-- Икона на сайта -->
    <link rel="icon" href="/favicon.ico" />


    <!-- Връзка към CSS файл от директорията public -->
    <link rel="stylesheet" href="/styles.css"> <!-- Променен път към styles.css -->
  </head>

  <body>

    <!-- Съобщение за успешно качване -->
    <div id="message">
      Файлът беше качен успешно!
    </div>
  
    <h2>Качи файл до учителя</h2>
    <form action="/upload" method="post" enctype="multipart/form-data">
      <input type="file" name="file" required />
      <button type="submit">Качи</button>
    </form>

    <h2>Файлове от учителя:</h2>
    <ul>
      <li><a href="/pr1.docx">pr1</a></li>
    </ul>

    <!-- Връзка към JavaScript файл от директорията public -->
    <script src="/scripts.js"></script> <!-- Променен път към scripts.js -->
  </body>
</html>
